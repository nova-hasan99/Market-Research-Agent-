<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MarketLens</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .auth-body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      text-decoration: none;
    }
    .auth-logo .logo-icon { font-size: 1.4rem; color: var(--blue); }
    .auth-logo .logo-text { font-weight: 700; font-size: 1.15rem; }
    .auth-title {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }
    .auth-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-field { display: flex; flex-direction: column; gap: 0.35rem; }
    .auth-field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .auth-field input {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .auth-field input:focus { border-color: var(--blue); }
    .auth-submit {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    .auth-submit:hover { background: var(--primary2); }
    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .auth-footer a { color: var(--blue); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    .auth-divider {
      height: 1px;
      background: var(--border);
      margin: 0.5rem 0 1.25rem;
    }
  </style>
</head>
<body class="auth-body">

  <nav class="landing-nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">MarketLens</span>
      </a>
      <div class="nav-links">
        <a href="/research" class="nav-btn-ghost">Research</a>
        <a href="/register" class="nav-btn-primary">Register</a>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">MarketLens</span>
      </a>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to access your analysis dashboard</div>

      {% if error %}
      <div class="auth-error">{{ error | replace('+', ' ') }}</div>
      {% endif %}

      <form class="auth-form" method="POST" action="/login">
        <input type="hidden" name="next_url" value="{{ next }}" />
        <div class="auth-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="auth-submit">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </main>

</body>
</html>
