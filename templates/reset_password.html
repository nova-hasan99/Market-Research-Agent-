<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password - MarketLens</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .auth-body { min-height:100vh;display:flex;flex-direction:column;background:var(--bg); }
    .auth-main { flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem; }
    .auth-card { background:var(--card);border:1px solid var(--border);border-radius:14px;
                 padding:2.25rem 2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    .auth-logo { display:flex;align-items:center;gap:0.5rem;margin-bottom:1.75rem;text-decoration:none; }
    .auth-logo .logo-icon { font-size:1.4rem;color:var(--blue); }
    .auth-logo .logo-text { font-weight:700;font-size:1.15rem; }
    .auth-title { font-size:1.35rem;font-weight:800;margin-bottom:0.25rem; }
    .auth-sub { font-size:0.875rem;color:var(--muted);margin-bottom:1.75rem; }
    .auth-form { display:flex;flex-direction:column;gap:1rem; }
    .auth-field { display:flex;flex-direction:column;gap:0.35rem; }
    .auth-field label { font-size:0.78rem;font-weight:600;color:var(--muted);
                        text-transform:uppercase;letter-spacing:0.05em; }
    .auth-field input { background:var(--bg2);border:1px solid var(--border);color:var(--text);
                        border-radius:8px;padding:0.65rem 0.9rem;font-size:0.9rem;
                        font-family:inherit;outline:none;transition:border-color 0.15s;width:100%; }
    .auth-field input:focus { border-color:var(--blue); }
    .auth-submit { width:100%;padding:0.7rem 1rem;border-radius:8px;border:none;
                   background:var(--primary);color:#fff;font-size:0.95rem;font-weight:700;
                   cursor:pointer;transition:background 0.15s;margin-top:0.25rem; }
    .auth-submit:hover { background:var(--primary2); }
    .auth-footer { text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--muted); }
    .auth-footer a { color:var(--blue);text-decoration:none; }
    .auth-error { background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
                  border-radius:8px;padding:0.7rem 0.9rem;color:#fca5a5;font-size:0.875rem;margin-bottom:0.5rem; }
    .token-missing { text-align:center;padding:1.5rem 0;color:var(--muted); }
  </style>
</head>
<body class="auth-body">
<main class="auth-main">
  <div class="auth-card">

    <a href="/" class="auth-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">MarketLens</span>
    </a>

    <div class="auth-title">Set New Password</div>
    <div class="auth-sub">Choose a strong password for your account.</div>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <!-- Token either pre-filled by server (PKCE flow) or read from hash (implicit flow) -->
    <form class="auth-form" method="POST" action="/reset-password" id="reset-form">
      <input type="hidden" name="access_token"  id="access_token_field"  value="{{ access_token or '' }}" />
      <input type="hidden" name="refresh_token" id="refresh_token_field" value="{{ refresh_token or '' }}" />

      <div class="auth-field">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password"
               placeholder="Minimum 6 characters" required minlength="6"
               autocomplete="new-password" />
      </div>
      <div class="auth-field">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password"
               placeholder="Repeat your new password" required minlength="6"
               autocomplete="new-password" />
      </div>

      <div id="no-token-msg" class="token-missing" style="display:none">
        ⚠ Invalid or expired reset link.<br>
        <a href="/forgot-password" style="color:var(--blue)">Request a new one</a>
      </div>

      <button type="submit" class="auth-submit" id="submit-btn">Set New Password</button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to Sign In</a>
    </div>

  </div>
</main>

<script>
  (function () {
    const atField = document.getElementById('access_token_field');
    const rtField = document.getElementById('refresh_token_field');

    // If server already filled the token (PKCE flow), use it directly.
    // Otherwise try the hash fragment (implicit/legacy flow).
    if (!atField.value) {
      const hash   = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const at     = params.get('access_token');
      const rt     = params.get('refresh_token') || '';
      if (at) {
        atField.value = at;
        rtField.value = rt;
      }
    }

    // If still no token, the link is invalid or expired
    if (!atField.value) {
      document.getElementById('no-token-msg').style.display = 'block';
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').style.opacity = '0.5';
    }

    // Client-side password match check
    document.getElementById('reset-form').addEventListener('submit', function (e) {
      const p1 = document.getElementById('new_password').value;
      const p2 = document.getElementById('confirm_password').value;
      if (p1 !== p2) {
        e.preventDefault();
        alert('Passwords do not match.');
      }
    });
  })();
</script>
</body>
</html>
